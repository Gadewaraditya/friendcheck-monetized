// ─── Sharing Utilities ────────────────────────────────────────────────────────
const SHARE_URL = window.location.href;

async function captureCard(cardRef, scale = 2) {
  if (!cardRef) return null;
  try {
    const canvas = await html2canvas(cardRef, {
      scale: scale,
      backgroundColor: null,
      useCORS: true,
      logging: false,
      allowTaint: true,
    });
    return canvas;
  } catch (err) {
    console.error('html2canvas error:', err);
    return null;
  }
}

async function downloadPNG(cardRef, filename = 'friendcheck-result.png') {
  showToast('Generating image...', 'hourglass_top');
  const canvas = await captureCard(cardRef, 3);
  if (!canvas) { showToast('Failed to generate image', 'error'); return; }
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Image downloaded! 📸', 'download_done');
}

async function downloadStoryPNG(cardRef) {
  showToast('Creating Instagram Story...', 'hourglass_top');
  const canvas = await captureCard(cardRef, 2);
  if (!canvas) { showToast('Failed to generate story', 'error'); return; }
  const link = document.createElement('a');
  link.download = 'friendcheck-story.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Story image saved! Post it on Instagram 📲', 'download_done');
}

// WhatsApp: Smart sharing logic based on user device
function shareWhatsApp(text) {
  const encoded = encodeURIComponent(text);
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  if (isMobile) {
    // Try forcing native app launch on mobile platforms
    window.location.href = 'whatsapp://send?text=' + encoded;
  } else {
    // Open standard Whatsapp API on web/desktop 
    window.open('https://api.whatsapp.com/send?text=' + encoded, '_blank', 'noopener,noreferrer');
  }
}

// Clipboard copy with textarea fallback for older WebViews (Instagram in-app browser, etc.)
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(function() { showToast('Copied to clipboard! 🔗', 'content_copy'); })
      .catch(function() { fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.cssText = 'position:fixed;top:0;left:0;width:2em;height:2em;padding:0;border:none;outline:none;box-shadow:none;background:transparent;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showToast('Copied! 🔗', 'content_copy'); }
  catch (e) { showToast('Copy failed — try long-pressing the text', 'error'); }
  document.body.removeChild(ta);
}

// Native Share API: tries image-file sharing first, falls back to text+URL.
// On iOS Safari 15+ and Chrome on Android this opens the native share sheet.
async function nativeShare(text, title, cardRef) {
  if (!navigator.share) return false;
  try {
    const canvas = await captureCard(cardRef, 2);
    if (canvas && navigator.canShare) {
      const blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
      const file = new File([blob], 'friendcheck-result.png', { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ title: title, text: text, files: [file] });
        return true;
      }
    }
    // Text + URL fallback (no image)
    await navigator.share({ title: title, text: text, url: SHARE_URL });
    return true;
  } catch (e) {
    if (e.name !== 'AbortError') console.error('Native share failed:', e);
    return false;
  }
}

    </div>
  );
}

// ─── Result Screen ────────────────────────────────────────────────────────────
function ResultScreen({ score, onRestart }) {
  const result = getResult(score);
  const [visible, setVisible] = useState(false);
  const [showConfetti, setShowConfetti] = useState(false);
  const [counterValue, setCounterValue] = useState(0);
  const [downloading, setDownloading] = useState(false);
  const cardRef = useRef(null);
  const storyCardRef = useRef(null);

  useEffect(() => {
    setShowConfetti(true);
    setTimeout(() => setVisible(true), 100);
    const target = result.percentage;
    const duration = 1500;
    const start = Date.now();
    const timer = setInterval(() => {
      const elapsed = Date.now() - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setCounterValue(Math.round(target * eased));
      if (progress >= 1) clearInterval(timer);
    }, 16);
    const confettiTimer = setTimeout(() => setShowConfetti(false), 4000);
    return () => { clearInterval(timer); clearTimeout(confettiTimer); };
  }, []);
  // ── Notify external ad/affiliate layer when result is displayed ──────────
  useEffect(() => {
    window.dispatchEvent(new CustomEvent('fc-result', {
      detail: { percentage: result.percentage, title: result.title }
    }));
  }, []);


  const cleanTitle = result.title.replace(/^.\s*/, '');

  // WhatsApp message: short, punchy, includes score + title + URL

    `📋 Result: *${cleanTitle}*\n` +

            <span className="material-symbols-outlined text-lg">download</span>

            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

        {/* Native Share / More Options — visible on all devices, most useful on mobile */}

      {/* ── Tier Breakdown ── */}
      <div className="glass-card rounded-xl p-6 md:p-8 mb-6">

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('start');
  const [currentQuestion, setCurrentQuestion] = useState(0);
  const [selectedOption, setSelectedOption] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [totalScore, setTotalScore] = useState(0);
  const [animClass, setAnimClass] = useState('animate-slide-in');
  
  // Track shuffled state for the ongoing test run
  const [activeQuestions, setActiveQuestions] = useState(questions);

  // Helper function to shuffle an array
  const shuffleArray = (array) => {
    let newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
  };

  const handleStart = useCallback(() => {
    // Generate a new layout with randomly shuffled options each time
    const randomizedQuestions = questions.map(q => ({
      ...q,
      options: shuffleArray(q.options)
    }));
    
    setActiveQuestions(randomizedQuestions);
    setScreen('quiz'); 
    setCurrentQuestion(0); 
    setSelectedOption(null); 
    setAnswers([]); 
    setTotalScore(0); 
    setAnimClass('animate-slide-in');
  }, []);

  const handleSelect = useCallback((idx) => { setSelectedOption(idx); }, []);

  const handleNext = useCallback(() => {
    if (selectedOption === null) return;
    
    // Always map points from the currently shuffled instance, ensuring correct score tracking
    const points = activeQuestions[currentQuestion].options[selectedOption].points;
    const newScore = totalScore + points;
    
    setTotalScore(newScore); 
    setAnswers([...answers, selectedOption]);
    
    if (currentQuestion < activeQuestions.length - 1) {
      setAnimClass('animate-slide-out');
      setTimeout(() => { 
        setCurrentQuestion(prev => prev + 1); 
        setSelectedOption(null); 
        setAnimClass('animate-slide-in'); 
      }, 300);
    } else {
      setAnimClass('animate-slide-out');
      setTimeout(() => { setScreen('result'); }, 300);
    }
  }, [selectedOption, currentQuestion, totalScore, answers, activeQuestions]);

  const handleRestart = useCallback(() => {
    setScreen('start'); setCurrentQuestion(0); setSelectedOption(null); setAnswers([]); setTotalScore(0);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  return (
    <div className="min-h-screen relative overflow-hidden">
      {/* Navbar */}
      <nav className="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(255,172,232,0.15)]">
        <div className="flex justify-between items-center px-4 md:px-10 py-4 max-w-[1280px] mx-auto">
          <a className="font-display text-2xl font-extrabold bg-gradient-to-r from-primary to-secondary-container bg-clip-text text-transparent hover:scale-105 transition-transform duration-200" href="#">FriendCheck</a>
          <div className="hidden md:flex items-center gap-8">
            <a className="font-headline text-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Home</a>
            <a className="font-headline text-sm text-primary font-bold border-b-2 border-primary pb-0.5" href="#">Friendship Test</a>
            <a className="font-headline text-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Tools</a>
          </div>
          {screen === 'quiz' && (
            <div className="flex items-center gap-2 px-4 py-1.5 rounded-full bg-surface-container-high border border-white/10">
              <span className="material-symbols-outlined text-primary text-base" style={{ fontVariationSettings: "'FILL' 1" }}>quiz</span>
              <span className="font-body text-xs font-bold text-on-surface">{currentQuestion + 1} / {activeQuestions.length}</span>
            </div>
          )}
        </div>
      </nav>

      {/* BG blobs */}
      <div className="fixed top-40 -left-32 w-80 h-80 bg-primary/10 blur-[100px] animate-pulse-slow pointer-events-none"></div>
      <div className="fixed bottom-20 -right-32 w-80 h-80 bg-secondary-container/10 blur-[100px] animate-pulse-slow pointer-events-none" style={{ animationDelay: '4s' }}></div>
      <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-tertiary-container/5 blur-[150px] animate-pulse-slow pointer-events-none" style={{ animationDelay: '2s' }}></div>

      <main className="pt-24 pb-16 px-4 md:px-10 min-h-screen flex items-center justify-center relative z-10">
        {screen === 'start' && <StartScreen onStart={handleStart} />}
        {screen === 'quiz' && <QuestionCard question={activeQuestions[currentQuestion]} questionIndex={currentQuestion} totalQuestions={activeQuestions.length} selectedOption={selectedOption} onSelect={handleSelect} onNext={handleNext} animationClass={animClass} />}
        {screen === 'result' && <ResultScreen score={totalScore} onRestart={handleRestart} />}
      </main>

      <footer className="bg-surface-container-lowest w-full border-t border-white/5">
        <div className="flex flex-col md:flex-row justify-between items-center px-4 md:px-10 py-8 max-w-[1280px] mx-auto">
          <span className="font-body text-sm text-on-surface-variant">© 2025 FriendCheck. Stay Viral. 💖</span>
          <div className="flex gap-6 mt-4 md:mt-0">
            <a className="font-body text-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
            <a className="font-body text-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms</a>
            <a className="font-body text-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
