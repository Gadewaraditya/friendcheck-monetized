<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — FriendCheck</title>
  <link rel="stylesheet" href="shared/fc-design-system.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 1rem 0 0.5rem;
    }
    p {
      color: #94a3b8;
      max-width: 400px;
      margin: 0 auto 2rem;
    }
    .btn-home {
      display: inline-block;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: #fff;
      font-weight: 700;
      padding: 0.85rem 2.5rem;
      border-radius: 9999px;
      text-decoration: none;
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    .btn-home:hover { opacity: 0.85; }
  </style>

<script src="https://tightslybella.com/e8/b4/4a/e8b44a4fa8c22d3ffbca58de510433c0.js"></script>
</head>
<body>
  <div class="error-code">404</div>
  <h1>Oops! This page ghosted you 👻</h1>
  <p>The page you're looking for doesn't exist or was moved. Let's get you back to the fun.</p>
  <a href="/" class="btn-home">🏠 Back to FriendCheck</a>

  <script src="shared/fc-nav.js"></script>
  <script>FCNav.init({ active: '' });</script>

<script src="https://tightslybella.com/47/1c/b2/471cb23c2c2fe4fcae0b936a06abe2d4.js"></script>

</html>
